name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Linting y Testing del Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8
      
      - name: Lint with flake8
        working-directory: ./Backend
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run tests with pytest
        working-directory: ./Backend
        run: |
          pytest -v --cov=. --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./Backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Job 2: Build y Test del Frontend
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./Frontend
        run: npm ci
      
      - name: Lint
        working-directory: ./Frontend
        run: npm run lint
      
      - name: Run tests with Jest
        working-directory: ./Frontend
        run: npm test -- --coverage --watchAll=false
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./Frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
      
      - name: Build
        working-directory: ./Frontend
        run: npm run build

  # Job 3: Build de imágenes Docker
  docker-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./Backend
          push: false
          tags: iarecetas-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:1/ || exit 1
          curl -f http://localhost:3000/ || exit 1
          docker-compose logs backend
          docker-compose logs frontend
          context: ./Frontend
          push: false
          tags: iarecetas-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker Compose
        run: |
          docker-compose up -d
          sleep 15
          curl -f http://localhost:5000/ || exit 1
          docker-compose down

  # Job 4: Push a Docker Hub (solo en main)
  docker-push:
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/iarecetas-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/iarecetas-backend:${{ github.sha }}
      
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/iarecetas-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/iarecetas-frontend:${{ github.sha }}
